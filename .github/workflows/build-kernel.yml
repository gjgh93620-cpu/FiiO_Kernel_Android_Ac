name: Build RK3188 Kernel with Framebuffer Console

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel

      - name: Setup Android NDK toolchain (GCC 4.9)
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r17c-linux-x86_64.zip
          unzip -q android-ndk-r17c-linux-x86_64.zip
          android-ndk-r17c/build/tools/make_standalone_toolchain.py \
            --arch arm --api 21 --install-dir /opt/arm-gcc-4.9
          echo "PATH=/opt/arm-gcc-4.9/bin:$PATH" >> $GITHUB_ENV
          echo "CROSS_COMPILE=arm-linux-androideabi-" >> $GITHUB_ENV
          echo "ARCH=arm" >> $GITHUB_ENV

      - name: Configure kernel
        working-directory: ./kernel
        run: |
          make rk3188_X5_defconfig
          echo "CONFIG_FRAMEBUFFER_CONSOLE=y" >> .config
          echo "CONFIG_FRAMEBUFFER_CONSOLE_DETECT_PRIMARY=y" >> .config
          echo "CONFIG_LOGO=y" >> .config
          yes "" | make oldconfig

      - name: Build kernel
        working-directory: ./kernel
        run: |
          make -j$(nproc)

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: zImage
          path: kernel/arch/arm/boot/zImage