name: Build RK3188 Kernel with Framebuffer Console

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel

      - name: Install cross compiler (GCC 9)
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabi gcc-9-arm-linux-gnueabi
          sudo update-alternatives --install /usr/bin/arm-linux-gnueabi-gcc \
            arm-linux-gnueabi-gcc /usr/bin/arm-linux-gnueabi-gcc-9 100
          sudo update-alternatives --set arm-linux-gnueabi-gcc /usr/bin/arm-linux-gnueabi-gcc-9

      - name: Configure kernel
        working-directory: ./kernel
        run: |
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-gnueabi-
          make rk3188_X5_defconfig
          echo "CONFIG_FRAMEBUFFER_CONSOLE=y" >> .config
          echo "CONFIG_FRAMEBUFFER_CONSOLE_DETECT_PRIMARY=y" >> .config
          echo "CONFIG_LOGO=y" >> .config
          yes "" | make oldconfig

      - name: Build kernel
        working-directory: ./kernel
        run: |
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-gnueabi-
          make -j$(nproc)

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: zImage
          path: kernel/arch/arm/boot/zImage