name: Build RK3188 Kernel with Framebuffer Console (GCC 4.8)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel

      - name: Setup Android NDK r13b (GCC 4.8)
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r13b-linux-x86_64.zip
          unzip -q android-ndk-r13b-linux-x86_64.zip
          android-ndk-r13b/build/tools/make_standalone_toolchain.py \
            --arch arm --api 21 --install-dir /opt/arm-gcc-4.8
          echo "PATH=/opt/arm-gcc-4.8/bin:$PATH" >> $GITHUB_ENV
          echo "CROSS_COMPILE=arm-linux-androideabi-" >> $GITHUB_ENV
          echo "ARCH=arm" >> $GITHUB_ENV

      - name: Configure kernel
        working-directory: ./kernel
        run: |
          # 使用设备 defconfig
          make rk3188_X5_defconfig
          # 启用 Framebuffer Console
          echo "CONFIG_FRAMEBUFFER_CONSOLE=y" >> .config
          echo "CONFIG_FRAMEBUFFER_CONSOLE_DETECT_PRIMARY=y" >> .config
          echo "CONFIG_LOGO=y" >> .config
          # 保持 Mali 驱动开启（不手动禁用）
          yes "" | make oldconfig

      - name: Build kernel
        working-directory: ./kernel
        run: |
          make -j$(nproc)

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: zImage
          path: kernel/arch/arm/boot/zImage